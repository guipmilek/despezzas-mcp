services:
  - type: web
    name: despezzas-mcp
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: MCP_TRANSPORT
        value: http
      - key: HOST
        value: 0.0.0.0
      - key: DESPEZZAS_SESSION_FILE
        value: none
      - key: MCP_OAUTH_ACCESS_TOKEN_TTL_SECONDS
        value: "3600"
      - key: MCP_OAUTH_TOKEN_SECRET
        generateValue: true
      - key: DESPEZZAS_EMAIL
        sync: false
      - key: DESPEZZAS_PASSWORD
        sync: false
      - key: MCP_PUBLIC_BASE_URL
        sync: false
